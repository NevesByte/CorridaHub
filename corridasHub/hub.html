<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Corrida Hub</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../geral.css">
  <link rel="stylesheet" href="hub.css">
</head>

<body>

<header>
    <img src="../img/CORRIDA.png" alt="Logo do Corrida Hub" class="menu-icon">
  <h1>Corrida Hub</h1>
  <nav>
    <ul>
      <li><a href="#">Sobre</a></li>
      <li><a href="#">Corridas</a></li>
      <li><a href="#">Histórico</a></li>
    </ul>
  </nav>
</header>
<main>

  <section class="busca-corridas-container">

    <h2>Busque por corridas</h2>

    <div class="busca-corridas">

      <!-- FORM -->
      <form class="form" id="formBusca">

  <h3>Filtros</h3>

  <div class="campo">
    <label>Nome do evento</label>
    <input type="text" id="nome" placeholder="Digite o nome...">
  </div>

  <div class="campo">
    <label>Distância (KM)</label>
    <input type="text" id="distancia" placeholder="Digite a distância...">
  </div>

  <div class="campo">
    <label>Região</label>
    <input type="text" id="regiao" placeholder="Ex: Centro">
  </div>

  <div class="campo">
    <label>Data</label>
    <input type="date" id="data">
  </div>

  <div class="campo">
    <label>Tipo</label>
    <select id="tipo">
      <option value="">Selecione</option>
      <option value="rua">Corridas de rua</option>
      <option value="campo">Corridas de campo</option>
      <option value="trilha">Corridas de trilha</option>
      <option value="escada">Corridas de escada</option>
      <option value="cross">Corridas cross country</option>
    </select>
  </div>

  <div class="campo">
    <label>Categoria</label>
    <select id="categoria">
      <option value="">Selecione</option>
      <option value="masculino">Masculino</option>
      <option value="feminino">Feminino</option>
      <option value="jovens">Jovens</option>
      <option value="criancas">Crianças</option>
      <option value="veteranos">Veteranos</option>
      <option value="iniciantes">Iniciantes</option>
      <option value="todos">Todos</option>
    </select>
  </div>

  <div class="campo">
    <label>Premiação</label>
    <select id="premiacao">
      <option value="">Selecione</option>
      <option value="sem">Sem premiação</option>
      <option value="com">Com premiação (Sem dinheiro)</option>
      <option value="dinheiro">Premiação em dinheiro</option>
    </select>
  </div>

  <button type="submit">Buscar</button>

</form>
<div class="resultados" id="resultados">
        <!-- Resultados aparecerão aqui -->

</div>
</section>

</main>
<footer>
  <div>
    <h2>Corrida Hub</h2>
    <p>© 2026 Todos os direitos reservados</p>
  </div>

  <div>
    <h3>Navegação</h3>
    <ul>
      <li>Início</li>
      <li>Corridas</li>
      <li>Sobre</li>
      <li>Contato</li>
    </ul>
  </div>

  <div>
    <h3>Contato</h3>
    <address>Itapetininga</address>
    <a href="#">ifsp@gmail.com</a>
  </div>

  <div>
    <h3>Desenvolvedores</h3>
    <a href="#">LinkedIn / Victor</a>
    <a href="#">Thomas</a>
  </div>
</footer>
<!-- VLibras Plugin -->
<div vw class="enabled">
  <div vw-access-button class="active"></div>
  <div vw-plugin-wrapper>
    <div class="vw-plugin-top-wrapper"></div>
  </div>
</div>
<script src="hub.js"></script>
<script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
<script>
  new window.VLibras.Widget('https://vlibras.gov.br/app');
</script>
</body>
</html>
